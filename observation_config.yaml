    telescope: "Vixen R200SS"            # OTA（光學管）
    mount: "Takahashi EM-11 Temma3"      # 赤道儀
    camera: "Canon EOS 6D Mark II"       # 相機（已移除 IR-cut）
    cal_label: "R200SS_6D2"              # 校正資料夾標籤
    targets: ["AlVel", "CCAnd", "Gaia375"]
    calibration_date: "20251122"
    dark_temp_c: 5.3
    light_temp_c: 7
    iso: 3200
    obs_lat_deg: 24.076856
    obs_lon_deg: 121.171665
    obs_height_m: 2106

  - date: "20251220"
    site: "Tataka (Shandonpu Parking)"
    telescope: "Vixen R200SS"
    mount: "Takahashi EM-11 Temma3"
    camera: "Canon EOS 6D Mark II"
    cal_label: "R200SS_6D2"

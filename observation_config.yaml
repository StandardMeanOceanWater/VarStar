# -----------------------------------------------------------------------------
# 5. 目標星 hint 座標 (Targets)
# plate_solve.py 用此區段傳 -ra / -spd 給 ASTAP，將盲搜範圍縮至 5°。
# ra_hint_h  : RA（小時，十進制）
# dec_hint_deg: Dec（度，十進制，南天為負）
# display_name: AAVSO 查詢用星名（需有空格）
# vmag_approx : 目標星亮度，影響比較星篩選範圍
# -----------------------------------------------------------------------------
targets:    # JIN親手核對，誰再動它誰死
  V1162Ori:
    group: "Ori"
    ra_hint_h: 5.53388611      # 83.00829 deg = 05 32 01.99
    dec_hint_deg: -7.25689     # -07 15 24.8
    display_name: "V1162 Ori"
    vmag_approx: 9.89          # V 9.85-10.3
    period_d: 0.078684     #0.078684 d =113.305 min
  V1643Ori:
    group: "Ori"
    ra_hint_h: 5.542900      #period_d: 83.144 deg = 05h 32m 34s（VSX 確認值，核對通過 2026-03-13）
    dec_hint_deg: -7.211     # -07° 12' 40"
    display_name: "V1643 Ori"
    vmag_approx: 10.3         # V 10.26, 振幅 0.03mag, DSCT; AAVSO UID: 000-BFB-403
    period_d: 0.07303         # 0.07303d = 105.16min

  V1373Ori:
    group: "Ori"
    ra_hint_h: 5.484953
    dec_hint_deg: -6.634861
    display_name: "V1373 Ori"
    vmag_approx: 8.72         # 8.68 - 8.76 V
    period_d: 122.668

  HHOri:
    group: "Ori"
    ra_hint_h: 5.503194
    dec_hint_deg: -6.569222
    display_name: "HH Ori"
    vmag_approx: 12         # 11.0 - 13.4 p

  Gaia301:
    group: "Ori"
    ra_hint_h: 5.564478
    dec_hint_deg: -6.615639
    display_name: "Gaia DR3 3016754040524540160"
    vmag_approx: 9.50  #9.48 - 9.50 G


  AlVel:
    group: "Vel"
    ra_hint_h: 8.519801        # 127.797 deg = 08h 31m 11s（SIMBAD 確認，盲解驗證 2026-03-14）
    dec_hint_deg: -47.666      # -47° 39' 57"（SIMBAD 確認）
    display_name: "Al Vel"
    vmag_approx: 6.4           # V 6.15–6.76；HADS 變星

  CCAnd:
    group: "And"
    ra_hint_h: 0.730003        # 00 43 48.01 +42 16 55.8
    dec_hint_deg: 42.282167
    display_name: "CC And"
    vmag_approx: 9.3           # V 9.19 - 9.46 V
  
  Gaia375:
    group: "And"
    ra_hint_h: 0.784231      # 00 47 03.23 +41 57 53.4
    dec_hint_deg: 41.964833
    display_name: "Gaia DR3 375316507435909888"
    vmag_approx: 8.90         #8.90 - 8.93 G

  # SXPhe:
  #   group: "Phe"
  #   ra_hint_h: 	23.775803     # 323 46 32.89 -41 34 54.8
  #   dec_hint_deg: -41.581889
  #   display_name: "SX Phe"
  #   vmag_approx: 7.1          # 6.76 - 7.53 V


# -----------------------------------------------------------------------------
# 6. 校正參數 (Calibration)
# -----------------------------------------------------------------------------
calibration:
  tz_offset_hours: 8              # 台灣 UTC+8，用於 EXIF 時間轉換
  chunk_size: 10                  # Remedian 每批幀數（RAM 控制）

# -----------------------------------------------------------------------------
# 7. 星圖解算 (Astrometry)
# -----------------------------------------------------------------------------
astrometry:
  backend: "auto"
  # auto 邏輯：偵測到 google.colab → astrometry_net；否則 → astap
  output: "wcs_subdir"

  astap:
    executable: "C:/Program Files/astap/astap_cli.exe"
    db_path: "C:/Program Files/astap/d80"
    search_radius_deg: 30
    downsample: 2
    fov_override_deg: 0
    speed: "slow"
    timeout_sec: 300
    max_retries: 2

  astrometry_net:
    api_key: ""
    upload_downsample: 4
    timeout_sec: 300

# -----------------------------------------------------------------------------
# 8. VSX 自動查詢 (VSX Auto Query)
# plate_solve 完成後自動查詢 AAVSO VSX，找出視場內變星候選
# -----------------------------------------------------------------------------
vsx:
  auto_query: true              # false 可停用
  search_radius_deg: 1.55       # Canon 6D2 + R200SS 對角半徑
  auto_add_mag_max: 13.0        # 比這亮才自動加入 targets（太暗測光誤差大）
  auto_add_types: []            # 空白=全部，或指定如 [DSCT, HADS, RR]

# -----------------------------------------------------------------------------
# 9. Bayer 拆色 (DeBayer)
# -----------------------------------------------------------------------------
debayer:
  channels_output: ["R", "G1", "B"]   # G2 只做驗證，不輸出獨立光變曲線
  use_g2_as_independent: false

# -----------------------------------------------------------------------------
# 9. 比較星選取 (Comparison Stars)
# -----------------------------------------------------------------------------
comparison_stars:
  search_radius_arcmin: 40.0
  min_stars: 3
  # max_stars: 15                    # 2026-03-22 前：15 顆但從未生效
  max_stars: 20                      # 100 導致 64 暗星拖垮 ZP fit（slope 0.1）；20 顆近目標亮度即可
  min_separation_arcsec: 10.0
  # comp_mag_bright: 1.5      # 2026-03-22 前：對稱 ±1.5 等
  # comp_mag_faint:  1.5
  comp_mag_bright: 2.0      # 2026-03-22：亮端放寬（亮星 S/N 高，ZP leverage 強）
  comp_mag_faint:  1.5      # 暗端維持（暗星噪聲大，多了拖累回歸）
  comp_mag_min: 6.0         # 固定下限（不飽和）
  comp_mag_max: 13.0        # 固定上限
  # catalog_priority: ["AAVSO", "APASS", "Tycho2"]          # 2026-03-22 前：無 GaiaDR3，R/B 通道缺星等欄位
  catalog_priority: ["AAVSO", "APASS", "Tycho2", "GaiaDR3"]  # 2026-03-22：加入 Gaia DR3，R 通道用 G->Rc 轉換
  aavso_min_stars: 3
  aavso_fov_arcmin: 100
  aavso_maglimit: 15.0
  apass_radius_deg: 1.0
  apass_match_arcsec: 2.0
  check_star_max_sigma: 0.02
  comp_fwhm_min: 2.0
  comp_fwhm_max: 8.0
  save_zeropoint_diagnostic: true

# -----------------------------------------------------------------------------
# 10. 孔徑測光 (Aperture Photometry)
# -----------------------------------------------------------------------------
photometry:
  channels: ["R", "G1", "B"]
  use_g2_as_independent: false
  robust_regression_sigma: 3.0
  robust_regression_max_iter: 5
  robust_regression_min_points: 3
  aperture_growth_radii: [3, 4, 5, 6, 7, 8, 10, 12]  # pixels；舊值含 15，39" 過大移除
  sky_annulus_inner_px: 15
  sky_annulus_outer_px: 25
  max_fwhm_px: 8.0
  ensemble_normalize: true
  ensemble_min_comp: 3
  ensemble_max_iter: 10
  ensemble_convergence_tol: 0.0001
  # 幀品質篩選（三層）
  sharpness_min: 0.3    # S=flux(r=3px)/flux(r=8px) 下限；0.0=停用
  zp_r2_min: 0.0        # ZP 回歸 R2 下限；0.0=停用（保留 WARN 輸出）
  peak_ratio_min: 0.0   # [deprecated] 固定絕對值門檻，建議改用 peak_ratio_k
  peak_ratio_k: 3.0     # 自適應門檻倍數；peak_ratio < median - k×MAD 時剔除
  zp_intercept_sigma: 3.0  # ZP 截距突變閾值（倍 MAD）；薄雲/透明度驟變偵測
  sky_sigma: 3.0           # 背景突升閾值（倍 MAD）；起霧/散射光偵測
  aperture_growth_fraction: 0.97  # 舊值 0.95→0.99（太大）；0.97 在 r_max=12 下約 9-10px


# -----------------------------------------------------------------------------
# 11. 時間系統 (Timing)
# -----------------------------------------------------------------------------
timing:
  output_timescale: "BJD_TDB"
  use_midpoint: true
  ephemeris: "de432s"
  fits_time_keys:
    - "DATE-OBS"
    - "DATE-BEG"
    - "TIME-OBS"
  fits_exptime_keys:
    - "EXPTIME"
    - "EXPOSURE"
    - "EXP_TIME"

# -----------------------------------------------------------------------------
# 12. 大氣消光修正 (Atmospheric Extinction)
# -----------------------------------------------------------------------------
extinction:
  coefficients:
    R: 0.10
    G: 0.13
    B: 0.22
  airmass_method: "young1994"
  max_airmass: 99
  alt_min_airmass: 99   # 暫時關閉 airmass 門檻

# -----------------------------------------------------------------------------
# 13. 週期分析 (Period Analysis)
# 本區段控制 period_analysis.py 的週期分析參數
# -----------------------------------------------------------------------------
period_analysis:

  # Lomb-Scargle 週期圖
  lomb_scargle:
    method: "astropy"               # astropy.timeseries.LombScargle
    normalization: "standard"       # "standard" | "model" | "log"
    period_min_hr: 0.5              # 搜尋週期下限（小時）
    period_max_hours: 8.0           # LS 搜尋週期上限（小時）
    detrend_order: 1                # LS 前線性趨勢扣除（0=關，1=線性，2=二次）
    oversampling: 10                # 頻率格網 oversampling 因子

    # FAP 計算：bootstrap 迭代至收斂或上限，取先到者
    fap_method: "bootstrap"
    fap_bootstrap_max_iter: 1000    # 硬性上限
    fap_bootstrap_converge_window: 100   # 每 N 次檢查一次收斂
    fap_bootstrap_converge_tol: 0.05     # 相鄰視窗 FAP 相對變化 < 5% 視為收斂
    fap_threshold: 0.001            # FAP < 0.1% 視為顯著週期

  # 傅立葉擬合
  fourier_fit:
    max_harmonics: 8                # 諧波數上限（Delta Scuti 建議 4–8）
    model_selection: "BIC"          # BIC 最小化自動選階數
    min_data_points: 50             # 低於此點數不進行擬合
    sn_threshold: 4.0               # Breger S/N 門檻（諧波選取）

  # 預白化 (Pre-whitening)
  pre_whitening:
    enabled: true                   # 設為 false 可關閉
    sn_threshold: 4.0               # 殘差 S/N < 此值停止（Breger et al., 1993）
    max_frequencies: 10             # 最多萃取頻率數（防止無窮迴圈）
    # CSV 輸出預留（目前停用）
    save_csv: true                  # 每個萃取頻率輸出至 prewhitening_{target}_{ch}.csv

# -----------------------------------------------------------------------------
# 13. 輸出設定 (Output)
# -----------------------------------------------------------------------------
output:
  plots:
    dpi: 150
    format: "png"
    figsize_light_curve: [12, 5]
    figsize_periodogram: [10, 4]
    figsize_phase_folded: [8, 5]
    figsize_prewhitening: [15, 4]   # 預白化診斷圖（每次迭代 1 列）

# -----------------------------------------------------------------------------
# 14. 管線行為 (Pipeline Behavior)
# -----------------------------------------------------------------------------
pipeline:
  skip_existing: true
  log_level: "INFO"
  log_file: "pipeline/logs/pipeline_{date}.log"
  parallel: false
  n_workers: 1
  keep_intermediates: true

